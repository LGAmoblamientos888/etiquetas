<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Etiqueta LG Amoblamientos</title>
    <style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Helvetica', 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; color: #000; }
        
        .etiqueta { 
            width: 100mm; height: 140mm; 
            background: white; border: 4px solid #000;
            margin: 20px auto; padding: 10px;
            display: flex; flex-direction: column; 
            text-align: center;
            overflow: hidden;
        }

        .brand { font-size: 14px; letter-spacing: 2px; font-weight: 300; margin-bottom: 5px; }

        h1 { 
            font-size: 115px; margin: 0; 
            line-height: 0.9; font-weight: 900; 
        }

        .meta-row {
            display: flex; justify-content: space-between;
            padding: 0 5px; margin-bottom: 15px;
            font-size: 16px; font-weight: bold;
            text-transform: uppercase;
        }

        /* ENVÍO: Ahora con recuadro SÓLIDO */
        .shipping-box {
            border: 3px solid #000;
            padding: 8px; font-size: 18px;
            font-weight: 700; text-transform: uppercase;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        /* PIEZAS: Ahora con recuadro PUNTEADO */
        .content-box {
            border: 3px dashed #000;
            padding: 10px; min-height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900;
            text-transform: uppercase;
            flex-grow: 1; 
            line-height: 1.1;
        }

        .footer { 
            border-top: 4px solid #000; 
            margin-top: 10px; padding-top: 5px;
            font-size: 45px; font-weight: 900; 
        }

        @media print {
            body { background: none; }
            .etiqueta { margin: 0; border: 4px solid #000; }
        }
    </style>
</head>
<body>
    <div id="impresion"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('s') || '---';
        const factura = urlParams.get('c') || ''; 
        const totalBultos = parseInt(urlParams.get('b')) || 1;
        const envio = urlParams.get('e') || '';
        const sku = urlParams.get('sku') || '';
        const piezas = urlParams.get('p') || '';
        const recordId = urlParams.get('id');

        if (recordId) {
            fetch('https://hook.us2.make.com/amxste64q9w7h8jlu1mp9ps6fxu08mfo?id=' + recordId, { mode: 'no-cors' });
        }

        const contenedor = document.getElementById('impresion');

        for (let i = 1; i <= totalBultos; i++) {
            const facturaDeco = decodeURIComponent(factura).replace(/\+/g, ' ');
            const envioDeco = envio ? decodeURIComponent(envio).replace(/\+/g, ' ').replace(/\n/g, '<br>') : '';
            const skuDeco = sku ? decodeURIComponent(sku).replace(/\+/g, ' ') : '';
            const piezasDeco = piezas ? decodeURIComponent(piezas).replace(/\+/g, ' ') : '';

            contenedor.innerHTML += `
                <div class="etiqueta">
                    <div class="brand">SERVICE</div>
                    
                    <h1>#${service}</h1>
                    
                    <div class="meta-row">
                        <span>${facturaDeco}</span>
                        <span>${skuDeco}</span>
                    </div>

                    <div class="shipping-box">
                        ${envioDeco}
                    </div>

                    <div class="content-box">
                        ${piezasDeco}
                    </div>

                    <div class="footer">
                        BULTO ${i} / ${totalBultos}
                    </div>
                </div>`;
        }

        window.onload = function() { setTimeout(() => { window.print(); }, 800); };
    </script>
</body>
</html>
