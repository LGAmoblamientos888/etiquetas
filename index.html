<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Etiquetas LG Amoblamientos</title>
    <style>
        /* Forzamos que todo sea negro puro para la térmica */
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; color: #000; }
        
        .etiqueta { 
            width: 100mm; height: 140mm; 
            background: white; border: 3px solid #000;
            margin: 20px auto; padding: 12px;
            display: flex; flex-direction: column; 
            justify-content: space-between;
            page-break-after: always; 
            text-align: center;
            overflow: hidden; /* Evita que cualquier texto se escape del papel */
        }

        .header { 
            font-size: 18px; border-bottom: 3px solid #000;
            padding-bottom: 5px; font-weight: bold; 
        }

        h1 { 
            font-size: 110px; margin: 5px 0 0 0; flex-grow: 1; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; line-height: 1;
        }

        /* NUEVO: Contenedor para Factura y SKU debajo del # service */
        .referencias-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            text-transform: uppercase;
            padding: 0 5px;
            margin: -5px 0 5px 0; /* Ajuste para pegarlo al #service */
        }

        /* NUEVO: Estilo para Factura (más pequeño) */
        .factura-text {
            font-size: 14px; /* Tamaño reducido de 26px a 14px */
            text-align: left;
        }

        /* NUEVO: Estilo para SKU (más pequeño, igual que factura) */
        .sku-text {
            font-size: 14px; /* Tamaño reducido de 16px a 14px */
            text-align: right;
        }

        /* Contenedor principal de la línea de Piezas */
        .detalles-articulo {
            display: flex;
            justify-content: center; /* Centrado */
            align-items: center; 
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            padding: 8px 5px;
            margin: 5px 0;
            text-transform: uppercase;
        }

        /* NUEVO: Piezas con tamaño reducido y centrado */
        .piezas-text {
            font-size: 18px; /* Tamaño reducido de 22px a 18px */
            font-weight: 900;
            flex-grow: 1; 
            text-align: center; 
            overflow-wrap: break-word; /* Si el texto es gigante, se parte en líneas */
        }

        .tipo-envio { 
            font-size: 20px; 
            font-weight: 800; text-transform: uppercase; 
            margin: 10px 0; padding: 10px;
            border: 4px dashed #000;
            max-width: 100%;
            overflow-wrap: break-word; 
        }

        .footer { 
            border-top: 5px solid #000; 
            padding-top: 10px;
            font-size: 38px; 
            font-weight: 900; 
        }

        @media print {
            body { background: none; }
            .etiqueta { margin: 0; border: 3px solid #000; }
        }
    </style>
</head>
<body>
    <div id="impresion"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('s') || '---';
        const factura = urlParams.get('c') || 'CLIENTE'; // Usamos 'c' para factura como en tu link
        const totalBultos = parseInt(urlParams.get('b')) || 1;
        const envio = urlParams.get('e') || '';
        const recordId = urlParams.get('id');
        
        // Capturamos los parámetros de SKU y Piezas
        const sku = urlParams.get('sku') || '';
        const piezas = urlParams.get('p') || '';

        // SEÑAL A MAKE: Se dispara una sola vez al cargar la página
        if (recordId) {
            fetch('https://hook.us2.make.com/amxste64q9w7h8jlu1mp9ps6fxu08mfo?id=' + recordId, {
                mode: 'no-cors'
            });
        }

        const contenedor = document.getElementById('impresion');

        for (let i = 1; i <= totalBultos; i++) {
            // Limpieza de texto para evitar errores de símbolos
            const facturaDecodificada = decodeURIComponent(factura).replace(/\+/g, ' ');
            const envioDecodificado = envio ? decodeURIComponent(envio).replace(/\+/g, ' ').replace(/\n/g, '<br>') : '';
            const skuDecodificado = sku ? decodeURIComponent(sku).replace(/\+/g, ' ') : '';
            const piezasDecodificado = piezas ? decodeURIComponent(piezas).replace(/\+/g, ' ') : '';

            let htmlEtiqueta = `
                <div class="etiqueta">
                    <div class="header">SERVICE LG AMOBLAMIENTOS</div>
                    <h1>#${service}</h1>`;

            // NUEVA FILA: Factura y SKU justo debajo del # service
            htmlEtiqueta += `<div class="referencias-top">
                    <span class="factura-text">${facturaDecodificada}</span>
                    <span class="sku-text">${skuDecodificado}</span>
                </div>`;
            
            // Línea de Piezas (sin nombrar Piezas), centrada y más pequeña
            if (piezas) {
                htmlEtiqueta += `<div class="detalles-articulo">
                    <span class="piezas-text">${piezasDecodificado}</span>
                </div>`;
            }

            if (envio) {
                htmlEtiqueta += `<div class="tipo-envio">${envioDecodificado}</div>`;
            }

            htmlEtiqueta += `
                    <div class="footer">BULTO ${i} / ${totalBultos}</div>
                </div>`;
            
            contenedor.innerHTML += htmlEtiqueta;
        }

        window.onload = function() {
            setTimeout(() => { window.print(); }, 800);
        };
    </script>
</body>
</html>
