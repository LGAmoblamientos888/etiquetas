<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; }
        .etiqueta { 
            width: 100mm; height: 140mm; 
            background: white; border: 2px solid #000;
            margin: 20px auto; padding: 15px;
            display: flex; flex-direction: column; 
            justify-content: space-between;
            page-break-after: always; 
            box-sizing: border-box; text-align: center;
        }
        .header { font-size: 18px; border-bottom: 2px solid #000; padding-bottom: 5px; font-weight: bold; }
        h1 { font-size: 100px; margin: 10px 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .cliente { font-size: 26px; font-weight: bold; text-transform: uppercase; margin: 5px 0; }
        .tipo-envio { 
            font-size: 30px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin: 10px 0;
            border: 3px dashed #000;
            padding: 10px;
        }
        .footer { background: #000; color: #fff; padding: 12px; font-size: 32px; font-weight: bold; }
        @media print {
            body { background: none; }
            .etiqueta { margin: 0; border: 2px solid #000; }
        }
    </style>
</head>
<body>
    <div id="impresion"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('s') || '---';
        const cliente = urlParams.get('c') || 'CLIENTE';
        const totalBultos = parseInt(urlParams.get('b')) || 1;
        const envio = urlParams.get('e') || '';

        const contenedor = document.getElementById('impresion');

        for (let i = 1; i <= totalBultos; i++) {
            let htmlEtiqueta = `
                <div class="etiqueta">
                    <div class="header">SERVICE LG AMOBLAMIENTOS</div>
                    <h1>#${service}</h1>
                    <div class="cliente">${decodeURIComponent(cliente)}</div>`;
            
            if (envio) {
                htmlEtiqueta += `<div class="tipo-envio">${decodeURIComponent(envio)}</div>`;
            }

            htmlEtiqueta += `
                    <div class="footer">BULTO ${i} / ${totalBultos}</div>
                </div>`;
            
            contenedor.innerHTML += htmlEtiqueta;
        }

        window.onload = function() {
            setTimeout(() => { window.print(); }, 700);
        };
    </script>
</body>
</html>
