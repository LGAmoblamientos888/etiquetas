<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generador de Etiquetas - LG Amoblamientos</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; color: #000; }
        
        .etiqueta { 
            width: 100mm; height: 140mm; 
            background: white; border: 2px solid #000;
            margin: 20px auto; padding: 15px;
            display: flex; flex-direction: column; 
            justify-content: space-between;
            page-break-after: always; 
            box-sizing: border-box; text-align: center;
        }

        .header { 
            font-size: 18px; 
            border-bottom: 3px solid #000;
            padding-bottom: 8px; 
            font-weight: bold; 
        }

        h1 { 
            font-size: 110px;
            margin: 10px 0; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900;
        }

        .cliente { 
            font-size: 28px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 5px 0; 
        }

        /* Ajuste del tamaño de fuente para el tipo de envío */
        .tipo-envio { 
            font-size: 24px; /* Reducido para evitar que se salga del margen */
            font-weight: 900; 
            text-transform: uppercase; 
            margin: 15px 0;
            border: 4px dashed #000;
            padding: 12px;
            word-wrap: break-word; /* Asegura que el texto largo se parta si es necesario */
        }

        .footer { 
            border-top: 4px solid #000; 
            background: #fff; 
            color: #000; 
            padding: 15px 0; 
            font-size: 36px; 
            font-weight: 900; 
        }

        @media print {
            body { background: none; }
            .etiqueta { margin: 0; border: 3px solid #000; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div id="impresion"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('s') || '---';
        const cliente = urlParams.get('c') || 'CLIENTE';
        const totalBultos = parseInt(urlParams.get('b')) || 1;
        const envio = urlParams.get('e') || '';
        const recordId = urlParams.get('id');

        if (recordId) {
            fetch('https://hook.us2.make.com/amxste64q9w7h8jlu1mp9ps6fxu08mfo?id=' + recordId, {
                mode: 'no-cors'
            });
        }

        const contenedor = document.getElementById('impresion');

        for (let i = 1; i <= totalBultos; i++) {
            let htmlEtiqueta = `
                <div class="etiqueta">
                    <div class="header">SERVICE LG AMOBLAMIENTOS</div>
                    <h1>#${service}</h1>
                    <div class="cliente">${decodeURIComponent(cliente)}</div>`;
            
            if (envio) {
                // Reemplazamos saltos de línea por <br> para formatear la dirección
                const envioFormateado = decodeURIComponent(envio).replace(/\n/g, '<br>');
                htmlEtiqueta += `<div class="tipo-envio">${envioFormateado}</div>`;
            }

            htmlEtiqueta += `
                    <div class="footer">BULTO ${i} / ${totalBultos}</div>
                </div>`;
            
            contenedor.innerHTML += htmlEtiqueta;
        }

        window.onload = function() {
            setTimeout(() => { window.print(); }, 700);
        };
    </script>
</body>
</html>
